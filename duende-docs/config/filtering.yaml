# Stop phrases (phrases to completely exclude from keyword extraction)
stop_phrases:
  - 'min read'
  - 'read more'
  - 'learn more'

# Domain-specific stop words (brand names, product names, URL domains)
# These should never appear as keywords - they're noise from paths/URLs
domain_stop_words:
  - 'duende'
  - 'duendesoftware'
  - 'docs'
  - 'documentation'

